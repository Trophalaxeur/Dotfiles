# Font
font_family      Anonymous Pro
bold_font        Anonymous Pro Bold
italic_font      Anonymous Pro Italic
bold_italic_font Anonymous Pro Bold Italic
font_size        10.0

# Scrollback
scrollback_lines 20000

# Bell
enable_audio_bell yes

# Window
hide_window_decorations no
remember_window_size   yes
single_instance         yes

# Cursor
cursor_shape block

# Mouse
copy_on_select yes

# Tab bar (hidden when single tab)
tab_bar_style powerline
tab_bar_min_tabs 2

# Colors — Tangoesque (migrated from .Xresources)
background #111111
foreground #babdb6

color0  #000000
color1  #ff6565
color2  #93d44f
color3  #eab93d
color4  #4169e1
color5  #ce5c00
color6  #89b6e2
color7  #cccccc
color8  #555753
color9  #ff8d8d
color10 #01a91a
color11 #ffc123
color12 #4169e1
color13 #f57900
color14 #46a4ff
color15 #ffffff
